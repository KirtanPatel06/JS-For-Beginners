=========================================================================================================
-> Yaha pe hamne ek Button banaya hai, aur usko uniquely identify karne ke liye hamne usse ID di hai 'clickButton' naam se.

-> Ab agar aapko yaad ho to hamne 'this' ke concept me padha tha ki "console.log(this)" likhne par   Node.js mein 'Global Object' return hota hai, aur Browser mein bhi ek Global Object return hota hai jise ham 'Window Object' kehte hai.

-> To bas hamare paas esa ek window Object hota hai browser mein. Ab uss window Object ke andar ek aur 'document' naam ka Object hota hai.

-> 'document' HTML page ko represent karta hai.

-> 'document' ke paas bahut saare methods hote hain jinke through ham HTML elements ko access aur control kar sakte hain.
=========================================================================================================
++++++++++++++++++++++++++++++++++++++++ buttonRef.remove() +++++++++++++++++++++++++++++++++++++++++++++

Example: window.document.getElementById("clickButton")

-> getElementById() HTML me se uss ID wale element ko dhoondhta hai aur uska reference return karta hai.

Example: const buttonRef = window.document.getElementById("clickButton");

-> Ab buttonRef ke paas button element ka reference hai.
------------------------------------------------

-> Ab ham button par operations kar sakte hain.

Example: buttonRef.remove();

-> remove() button ko DOM (web page) se hata deta hai. Browser se button gayab ho jayega.
------------------------------------------------

-> IMPORTANT: button remove hone ke baad bhi buttonRef ke paas uss element ka reference ho sakta hai.

Example: const buttonRef = document.getElementById("clickButton");
         buttonRef.remove();

-> Button page se remove ho gaya.

-> Lekin buttonRef abhi bhi memory me uss element ko refer kar raha hai.
------------------------------------------------
Agar ham likhe: buttonRef = null;

-> To ham reference tod dete hain.

-> Ab agar kisi aur jagah se bhi uss element ka reference nahi hai, to JavaScript Garbage Collector future me uski memory free kar sakta hai.
------------------------------------------------

Memory Rule: Element remove karna ≠ Memory free karna

-> Memory tab free hoti hai jab object unreachable ho jata hai aur Garbage Collector usse clean kar de.
------------------------------------------------
-> DEVELOPER RULE: DOM se element hata dena kaafi nahi hota.

-> Agar unnecessary references bache hue hain, to objects memory me zinda reh sakte hain.

-> Isliye large applications me unused references, event listeners aur timers ko clean karna important hota hai.

-> Acche developers aur normal developers mein yahi fark hota hai. Agar acche developer banna chahte ho to unnecesarry reference ko remove karna mat bhulna kabhi bhi.

-> MMMMIIIIIMMMMPPPPP: This is also asked in INTERVIEWS.
=========================================================================================================

++++++++++++++++++++++++++++++++++++++++++ buttonRef.onclick ++++++++++++++++++++++++++++++++++++++++++

-> buttonRef ek DOM Object hai jo button element ko represent karta hai. Is object ke paas "onclick" naam ki ek property hoti hai.

-> By default: 'buttonRef.onclick' ki value null hoti hai (ya koi function assigned nahi hota).
------------------------------------------------

-> Ham onclick me ek function assign kar sakte hain:
buttonRef.onclick = function(){
    console.log("Button click hua");
}

-> Ab jab button click hoga, ye function execute hoga.
-------------------------------------------------

Problem: Agar baad me fir se likh diya:

buttonRef.onclick = function(){
    console.log("Kuch to hua");
}

-> To pehla function remove ho jayega. Sirf naya wala function hi chalega.

Kyuki: onclick ek SINGLE property hai. Ek time par usme sirf ek hi function store ho sakta hai.
--------------------------------------------------
Memory Rule: onclick = function() -> Previous handler ko replace kar deta hai.

-> Isliye multiple click handlers lagane ke liye onclick best choice nahi hai.
--------------------------------------------------

-> Isi problem ko solve karne ke liye JavaScript ne diya: .addEventListener()

-> Ye multiple event handlers register kar sakta hai bina pehle wale ko overwrite kiye.

Example:
buttonRef.addEventListener("click", fn1);
buttonRef.addEventListener("click", fn2);

Button click hone par: fn1() ✅, fn2() ✅ Dono execute honge.
=========================================================================================================

+++++++++++++++++++++++++++++++++++++ buttonRef.addEventListener() ++++++++++++++++++++++++++++++++++++++

-> Ab sawal aata hai ki .addEventListener() multiple functions ko overwrite kiye bina kaise execute kar leta hai?

-> Conceptually (samajhne ke liye), browser internally kuch aisa karta hai:

const buttonRef = {
    listeners: [],

    addEventListener(cb){
        this.listeners.push(cb);
    },

    browserMeClick(){
        for(const fn of this.listeners){
            fn();
        }
    }
};
--------------------------------------------------

-> Jab ham likhte hain: buttonRef.addEventListener("click", fn1);

-> To browser fn1 ko listeners list me store kar leta hai. listeners: [ fn1 ]
---------------------------------------------------

-> Fir agar ham likhe: buttonRef.addEventListener("click", fn2);

-> To fn2 bhi usi list me add ho jayega. listeners: [ fn1, fn2 ]
---------------------------------------------------

-> Ab jab button click hota hai,

Browser: Event click event detect karta hai aur for loop ki help se listeners[] me se saare functions ko ek ek krke utha ke execute karta hai.

Result: fn1() ✅, fn2() ✅ Dono chalenge.
----------------------------------------------------
Memory Rule: 
onclick -> Sirf ek function store karta hai.
addEventListener() -> Multiple functions store kar sakta hai.

-> Isliye addEventListener() previous handlers ko overwrite nahi karta.
=========================================================================================================

++++++++++++++++++++++++++++++++++++++++ .removeEventListener() +++++++++++++++++++++++++++++++++++++++++

-> addEventListener() internally event listeners ko store karta hai.

-> Agar ham listeners ko remove na kare aur baar-baar naye listeners add karte rahe, to unnecessary references memory me bane reh sakte hain.

-> Isliye jab listener ki zarurat na ho, use remove kar dena chahiye.
-----------------------------------------------------

-> Isliye ham function ko directly pass karne ki jagah ek variable me store kar lete hain. 
-> Ab ham uss function ka reference jo ki 'onClickHandler' mai hai usko pass karege.
-> Aur listeners[] list mein an fumction ka refernce(i.e onClickHandler) store hoga.

Example: const onClickHandler = function(){
            console.log("Button Click Hua");
        };

buttonRef.addEventListener("click", onClickHandler);
------------------------------------------------------

-> Ab jab uss function ki ki zarurat nahi rahe: buttonRef.removeEventListener("click", onClickHandler);

-> Browser listeners[] list me se uss function ka reference hata dega. Ab click hone par wo function execute nahi hoga.
------------------------------------------------------

IMPORTANT: removeEventListener() ko wahi exact function reference chahiye jo addEventListener() me diya tha.

Isliye ye kaam nahi karega: buttonRef.addEventListener("click", function(){...});
                            buttonRef.removeEventListener("click", function(){...});

-> Dono alag function objects hain.
-------------------------------------------------------
Memory Rule: removeEventListener() sirf listeners[] list me se reference remove karta hai.
 
-> Agar kisi variable me abhi bhi uss function ka reference pada hua hai, to function memory me zinda rahega.
Example: const onClickHandler = function(){...};

-> Yaha variable abhi bhi function ko point kar raha hai.

-> Agar kisi object/function ka aur koi reference nahi bacha,to future me Garbage Collector uski memory free kar sakta hai.
-------------------------------------------------------
-> Choti si cleanup, Bada sa performance impact. Especially large applications me.
